databaseChangeLog:
  - changeSet:
      id: 2026-03-01-add-vendor-active-flag
      author: harness-lab
      changes:
        - addColumn:
            tableName: vendors
            columns:
              - column:
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true
      rollback:
        - dropColumn:
            tableName: vendors
            columnName: is_active
  - changeSet:
      id: add-second-email-column
      author: harness-lab
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: second_email
                  type: varchar(255)
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: users
            columnName: second_email
  - changeSet:
      id: drop-transactions-table
      author: harness-lab
      changes:
        - sql:
            sql: DROP TABLE transactions;
      rollback:
        - sql:
            sql: SELECT 1;
