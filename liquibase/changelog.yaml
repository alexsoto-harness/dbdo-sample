databaseChangeLog:
  - changeSet:
      id: 2026-03-01-add-vendor-active-flag
      author: harness-lab
      changes:
        - addColumn:
            tableName: vendors
            columns:
              - column:
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true
      rollback:
        - dropColumn:
            tableName: vendors
            columnName: is_active
  - changeSet:
      id: add-second-email-column
      author: harness-lab
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: second_email
                  type: varchar(255)
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: users
            columnName: second_email
  - changeSet:
      id: add-vendor-phone
      author: harness-lab
      changes:
        - addColumn:
            tableName: vendors
            columns:
              - column:
                  name: phone
                  type: varchar(20)
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: vendors
            columnName: phone
  - include:
      file: create_parcels_table.sql
      relativeToChangelogFile: true            
